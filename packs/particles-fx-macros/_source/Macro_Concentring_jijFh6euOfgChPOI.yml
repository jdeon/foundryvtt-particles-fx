name: Concentring
type: script
command: "// Example of timed advanced variable\n// Link particle angle and sprite rotation needle point to source. And make size grow in one direction  befor shrink again to make think of mini rays.\n\nif (canvas.tokens.controlled.length === 0){\n  return ui.notifications.error(\"Please select a token first\");\n}\n\nfor (let source of canvas.tokens.controlled) {\n\n\tlet idEmitter = game.modules.get(\"particule-fx\").api.emit.gravit(\"silver\", {\n    source :source.id,\n    spawningFrequence: 1,\n    maxParticles: 20,\n    emissionDuration: 500,\n    particleLifetime: [500, 750],\n    particleVelocityStart : 0,\n    particleRadiusStart : \"100%\",\n    particleRadiusEnd : 0,\n    particleSizeStart : {x : \"{{a}}%\", y: \"2%\"},\n    particleAngleStart : \"{{b}}\",\n    particleRotationStart : \"{{b}}\",\n    alphaEnd: 1,\n    advanced: {\n        variables : {\n            a : ({tp}) => {if(tp < 5/10){ return tp * 98 + 2 } else { return 196 * (1 - tp) + 2}},\n           b : \"0_360\"\n        }\n    }\n})\n\nawait particlesFx.writeMessageForEmissionById(idEmitter, true)\n\n}"
