name: Firework
type: script
command: |-
  if (canvas.tokens.controlled.length === 0){
    return ui.notifications.error("Please select a token first");
  }

  for (let source of canvas.tokens.controlled) {

    let idEmitter = game.modules.get("particule-fx").api.emit.spray("fire",{
      source:source.id,
      spawningFrequence: 1,
      maxParticles: 20,
      emissionDuration: 2500,
      particleLifetime: [500, 750],
      particleVelocityStart: '500%',
      particleVelocityEnd: '100%',
      next: [{
        delay: 1,
        type: "atParticleEnd",
        particleInputs: [
          ["spray", "explosion", {maxParticles: 20, particleVelocityStart: "50%", particleLifetime:250}]
        ]
      }]
  })
    
  await particlesFx.writeMessageForEmissionById(idEmitter, true)
  }
